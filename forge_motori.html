<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipbook - La Forge</title>
    <link rel="stylesheet" href="forge_motori.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>

    <!-- Loader -->
    <div id="loader">
        <div class="spinner"></div>
        <p id="loaderMsg">Chargement …</p>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <span id="progressText">0%</span>
    </div>

    <!-- Flipbook -->
    <div id="flipbook-container" class="hidden">

        <!-- Zone livre -->
        <div id="book-wrapper">
            <div id="book-viewport">

                <!-- Flèche gauche -->
                <div id="click-left" class="nav-arrow" title="Page précédente">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </div>

                <div id="book">
                    <div class="book-page page-left">
                        <div class="page-content">
                            <img id="pageLeftImg" draggable="false">
                        </div>
                    </div>
                    <div class="book-page page-right">
                        <div class="page-content">
                            <img id="pageRightImg" draggable="false">
                        </div>
                    </div>
                    <div class="book-spine"></div>
                </div>

                <!-- Flèche droite -->
                <div id="click-right" class="nav-arrow" title="Page suivante">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 6 15 12 9 18"></polyline>
                    </svg>
                </div>

            </div>
        </div>

        <!-- Barre du bas -->
        <div id="bottom-bar">
            <div class="bar-left">
                <button id="btnGrid" class="bar-btn" title="Miniatures">
                    <svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                </button>
                <button id="btnAutoplay" class="bar-btn" title="Lecture auto">
                    <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
                </button>
            </div>
            <div class="bar-center">
                <span id="pageIndicator">1 / ?</span>
            </div>
            <div class="bar-right">
                <button id="btnFullscreen" class="bar-btn" title="Plein écran">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Animation flip -->
        <div id="flip-overlay" class="flip-hidden">
            <div id="flip-page">
                <div class="flip-front"><img id="flipFrontImg" draggable="false"></div>
                <div class="flip-back"><img id="flipBackImg" draggable="false"></div>
            </div>
        </div>

        <!-- Miniatures cachées -->
        <div id="thumbnails-bar" style="display:none;">
            <div id="thumbnails"></div>
        </div>
    </div>

    <script src="forge_motori.js"></script>
</body>
</html>
