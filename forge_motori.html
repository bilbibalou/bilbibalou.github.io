<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipbook - La Forge</title>
    <link rel="stylesheet" href="forge_motori.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>

    <!-- Loader -->
    <div id="loader">
        <div class="spinner"></div>
        <p id="loaderMsg">Chargement …</p>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <span id="progressText">0%</span>
    </div>

    <!-- Flipbook -->
    <div id="flipbook-container" class="hidden">

        <div id="book-wrapper">
            <div id="book-viewport">

                <!-- Flèche gauche -->
                <div id="click-left" class="nav-arrow" title="Page précédente">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </div>

                <!-- Livre (canvas) -->
                <div id="book">
                    <canvas id="pageCanvas"></canvas>
                </div>

                <!-- Flèche droite -->
                <div id="click-right" class="nav-arrow" title="Page suivante">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 6 15 12 9 18"></polyline>
                    </svg>
                </div>

            </div>
        </div>

        <!-- Barre du bas -->
        <div id="bottom-bar">
            <div class="bar-left">
                <button id="btnAutoplay" class="bar-btn" title="Lecture auto">
                    <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
                </button>
            </div>
            <div class="bar-center">
                <span id="pageIndicator">1 / ?</span>
            </div>
            <div class="bar-right">
                <button id="btnFullscreen" class="bar-btn" title="Plein écran">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 3 21 3 21 9"></polyline>
                        <polyline points="9 21 3 21 3 15"></polyline>
                        <line x1="21" y1="3" x2="14" y2="10"></line>
                        <line x1="3" y1="21" x2="10" y2="14"></line>
                    </svg>
                </button>
            </div>
        </div>

    </div>

    <script src="forge_motori.js"></script>
</body>
</html>
