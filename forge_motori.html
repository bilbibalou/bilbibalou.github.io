<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipbook - La Forge</title>
    <link rel="stylesheet" href="forge_motori.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>

    <!-- Loader -->
    <div id="loader">
        <div class="spinner"></div>
        <p id="loaderMsg">Chargement …</p>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <span id="progressText">0%</span>
    </div>

    <!-- Flipbook -->
    <div id="flipbook-container" class="hidden">

        <!-- Zone livre -->
        <div id="book-wrapper">
            <div id="book-viewport">
                <div id="book">
                    <div class="book-page page-left">
                        <div class="page-content">
                            <img id="pageLeftImg" draggable="false">
                        </div>
                    </div>
                    <div class="book-page page-right">
                        <div class="page-content">
                            <img id="pageRightImg" draggable="false">
                        </div>
                    </div>
                    <div class="book-spine"></div>
                </div>
            </div>

            <!-- Flèche gauche -->
            <div id="click-left" class="click-zone" title="Page précédente">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </div>

            <!-- Flèche droite -->
            <div id="click-right" class="click-zone" title="Page suivante">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 6 15 12 9 18"></polyline>
                </svg>
            </div>

            <!-- Indicateur page -->
            <div id="pageIndicator">Page 1 / ?</div>
        </div>

        <!-- Animation flip -->
        <div id="flip-overlay" class="flip-hidden">
            <div id="flip-page">
                <div class="flip-front">
                    <img id="flipFrontImg" draggable="false">
                </div>
                <div class="flip-back">
                    <img id="flipBackImg" draggable="false">
                </div>
            </div>
        </div>

        <!-- Miniatures cachées -->
        <div id="thumbnails-bar" style="display:none;">
            <div id="thumbnails"></div>
        </div>
    </div>

    <script src="forge_motori.js"></script>
</body>
</html>
