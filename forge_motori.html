<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipbook - La Forge</title>
    <link rel="stylesheet" href="forge_motori.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>

    <!-- Loader -->
    <div id="loader">
        <div class="spinner"></div>
        <p id="loaderMsg">Chargement …</p>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <span id="progressText">0%</span>
    </div>

    <!-- Flipbook -->
    <div id="flipbook-container" class="hidden">
        <!-- Toolbar -->
        <div class="toolbar">
            <button id="btnFirst" title="Première page">⏮</button>
            <button id="btnPrev" title="Page précédente">◀</button>
            <span id="pageIndicator">Page 1 / ?</span>
            <button id="btnNext" title="Page suivante">▶</button>
            <button id="btnLast" title="Dernière page">⏭</button>
            <div class="toolbar-right">
                <button id="btnZoomOut">➖</button>
                <button id="btnZoomReset">100%</button>
                <button id="btnZoomIn">➕</button>
                <button id="btnFullscreen">⛶</button>
            </div>
        </div>

        <!-- Zone livre -->
        <div id="book-wrapper">
            <div id="book-viewport">
                <div id="book">
                    <!-- Page gauche -->
                    <div class="book-page page-left">
                        <div class="page-content">
                            <img id="pageLeftImg" draggable="false">
                            <div class="page-number" id="pageLeftNum"></div>
                        </div>
                        <div class="page-shadow shadow-left"></div>
                    </div>

                    <!-- Page droite -->
                    <div class="book-page page-right">
                        <div class="page-content">
                            <img id="pageRightImg" draggable="false">
                            <div class="page-number" id="pageRightNum"></div>
                        </div>
                        <div class="page-shadow shadow-right"></div>
                    </div>

                    <!-- Reliure centrale -->
                    <div class="book-spine"></div>
                </div>
            </div>

            <!-- Zones cliquables -->
            <div id="click-left" class="click-zone" title="Page précédente"></div>
            <div id="click-right" class="click-zone" title="Page suivante"></div>
        </div>

        <!-- Animation de flip (overlay) -->
        <div id="flip-overlay" class="flip-hidden">
            <div id="flip-page">
                <div class="flip-front">
                    <img id="flipFrontImg" draggable="false">
                </div>
                <div class="flip-back">
                    <img id="flipBackImg" draggable="false">
                </div>
            </div>
        </div>

        <!-- Miniatures -->
        <div id="thumbnails-bar">
            <div id="thumbnails"></div>
        </div>
    </div>

    <script src="forge_motori.js"></script>
</body>
</html>
