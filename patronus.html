<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Découvre ton Patronus</title>
    <link rel="stylesheet" href="patronus.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Raleway:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <!-- CONTENU PRINCIPAL -->
    <div class="fireflies" id="fireflies-container"></div>
    <div class="container" id="container">
        <!-- ÉCRAN D'ACCUEIL -->
        <div class="screen active" id="screen-intro">
            <p class="intro-text">CLICK, DRAG AND RELEASE</p>
            <p class="intro-subtext">FOR YOUR PATRONUS</p>
            <div class="swipe-area" id="swipe-area"></div>
        </div>

        <!-- ÉCRAN DE QUESTION -->
        <div class="screen" id="screen-question">
            <div class="question-counter" id="question-counter"></div>
            <div class="choices" id="choices"></div>
        </div>

        <!-- ÉCRAN DE CHARGEMENT -->
        <div class="screen" id="screen-loading">
            <div class="patronus-orb">
                <div class="orb"></div>
            </div>
        </div>

        <!-- ÉCRAN RÉSULTAT -->
        <div class="screen" id="screen-result">
            <div class="result-glow"></div>
            <div class="patronus-emoji" id="patronus-emoji"></div>
            <h2 class="result-title">TON PATRONUS EST</h2>
            <h1 class="patronus-name" id="patronus-name"></h1>
            <p class="patronus-description" id="patronus-description"></p>
            <button class="btn-restart" id="btn-restart">RECOMMENCER</button>
        </div>
    </div>

    <!-- Barre son en bas à droite (décorative) -->
    <div class="sound-bars">
        <span></span><span></span><span></span><span></span>
    </div>

    <script src="patronus.js"></script>
</body>
</html>
