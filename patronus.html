<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Découvre ton Patronus</title>
    <link rel="stylesheet" href="patronus.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Raleway:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <!-- FORÊT SVG EN ARRIÈRE-PLAN -->
    <div class="forest-bg">
        <svg class="forest-layer forest-back" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
            <!-- Ciel -->
            <defs>
                <radialGradient id="skyGlow" cx="15%" cy="30%" r="50%">
                    <stop offset="0%" style="stop-color:#0d3b4f;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#050d12;stop-opacity:1" />
                </radialGradient>
                <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#0a1e26;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#030a0d;stop-opacity:1" />
                </linearGradient>
                <linearGradient id="trunkDark" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#0a1a20;stop-opacity:1" />
                    <stop offset="50%" style="stop-color:#0d2028;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#071318;stop-opacity:1" />
                </linearGradient>
                <linearGradient id="trunkMid" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#0f2a35" />
                    <stop offset="50%" style="stop-color:#163845" />
                    <stop offset="100%" style="stop-color:#0c2530" />
                </linearGradient>
                <linearGradient id="trunkLight" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#15394a" />
                    <stop offset="50%" style="stop-color:#1d4a5e" />
                    <stop offset="100%" style="stop-color:#123040" />
                </linearGradient>
            </defs>

            <!-- Ciel de fond -->
            <rect width="1920" height="1080" fill="url(#skyGlow)" />

            <!-- Lueur bleutée en haut à gauche -->
            <ellipse cx="280" cy="200" rx="400" ry="350" fill="rgba(10,60,80,0.4)" />
            <ellipse cx="280" cy="250" rx="250" ry="200" fill="rgba(15,80,100,0.2)" />

            <!-- ARBRES ARRIÈRE (plus sombres, plus fins) -->
            <!-- Arbre AR 1 -->
            <path d="M80,1080 L80,200 Q85,150 95,100 Q100,150 100,200 L105,1080 Z" fill="#071115" />
            <path d="M85,400 Q40,350 20,300" stroke="#071115" stroke-width="8" fill="none" stroke-linecap="round"/>
            <path d="M95,350 Q130,300 150,250" stroke="#071115" stroke-width="6" fill="none" stroke-linecap="round"/>

            <!-- Arbre AR 2 -->
            <path d="M200,1080 L195,180 Q205,120 215,80 Q220,130 218,180 L220,1080 Z" fill="#081318" />
            <path d="M205,500 Q170,430 140,380" stroke="#081318" stroke-width="7" fill="none" stroke-linecap="round"/>
            <path d="M212,420 Q250,370 270,320" stroke="#081318" stroke-width="6" fill="none" stroke-linecap="round"/>

            <!-- Arbre AR 3 -->
            <path d="M350,1080 L345,150 Q355,80 365,50 Q370,90 368,150 L370,1080 Z" fill="#091519" />
            <path d="M352,380 Q310,320 290,270" stroke="#091519" stroke-width="8" fill="none" stroke-linecap="round"/>

            <!-- Arbre AR 4 -->
            <path d="M500,1080 L496,200 Q505,130 514,70 Q518,140 516,200 L520,1080 Z" fill="#081217" />

            <!-- Arbre AR 5 -->
            <path d="M650,1080 L646,170 Q655,100 664,50 Q668,110 666,170 L670,1080 Z" fill="#091519" />

            <!-- Arbre AR 6 -->
            <path d="M800,1080 L796,190 Q805,120 814,60 Q818,130 816,190 L820,1080 Z" fill="#081318" />

            <!-- Arbre AR 7 -->
            <path d="M950,1080 L946,160 Q955,90 964,40 Q968,100 966,160 L970,1080 Z" fill="#091519" />

            <!-- Arbre AR 8 -->
            <path d="M1100,1080 L1096,180 Q1105,110 1114,55 Q1118,120 1116,180 L1120,1080 Z" fill="#081217" />

            <!-- Arbre AR 9 -->
            <path d="M1250,1080 L1246,200 Q1255,130 1264,70 Q1268,140 1266,200 L1270,1080 Z" fill="#091519" />

            <!-- Arbre AR 10 -->
            <path d="M1400,1080 L1396,170 Q1405,100 1414,45 Q1418,110 1416,170 L1420,1080 Z" fill="#081318" />

            <!-- Arbre AR 11 -->
            <path d="M1550,1080 L1546,190 Q1555,120 1564,60 Q1568,130 1566,190 L1570,1080 Z" fill="#071115" />

            <!-- Arbre AR 12 -->
            <path d="M1700,1080 L1696,210 Q1705,140 1714,80 Q1718,150 1716,210 L1720,1080 Z" fill="#091519" />

            <!-- Arbre AR 13 -->
            <path d="M1850,1080 L1846,180 Q1855,110 1864,50 Q1868,120 1866,180 L1870,1080 Z" fill="#081217" />
        </svg>

        <svg class="forest-layer forest-mid" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
            <!-- ARBRES MILIEU (teinte moyenne) -->
            <!-- Arbre M1 -->
            <path d="M30,1080 L20,250 Q35,150 50,80 Q60,160 55,250 L65,1080 Z" fill="#0c2530" />
            <path d="M35,500 Q-10,420 -30,360" stroke="#0c2530" stroke-width="12" fill="none" stroke-linecap="round"/>
            <path d="M45,450 Q90,380 120,320" stroke="#0c2530" stroke-width="10" fill="none" stroke-linecap="round"/>
            <path d="M38,600 Q0,540 -20,490" stroke="#0c2530" stroke-width="9" fill="none" stroke-linecap="round"/>

            <!-- Arbre M2 -->
            <path d="M150,1080 L140,220 Q160,120 175,50 Q185,130 178,220 L190,1080 Z" fill="url(#trunkMid)" />
            <path d="M155,450 Q110,380 80,310" stroke="#0f2a35" stroke-width="11" fill="none" stroke-linecap="round"/>
            <path d="M170,400 Q210,340 240,280" stroke="#0f2a35" stroke-width="9" fill="none" stroke-linecap="round"/>
            <path d="M160,550 Q120,500 100,450" stroke="#0f2a35" stroke-width="8" fill="none" stroke-linecap="round"/>

            <!-- Arbre M3 -->
            <path d="M300,1080 L290,200 Q310,100 325,30 Q335,110 328,200 L340,1080 Z" fill="#0e2832" />
            <path d="M305,420 Q260,350 230,280" stroke="#0e2832" stroke-width="12" fill="none" stroke-linecap="round"/>
            <path d="M320,380 Q370,310 400,250" stroke="#0e2832" stroke-width="10" fill="none" stroke-linecap="round"/>

            <!-- Arbre M4 - Large -->
            <path d="M440,1080 L420,180 Q450,80 475,20 Q495,90 485,180 L500,1080 Z" fill="url(#trunkMid)" />
            <path d="M440,400 Q390,330 360,260" stroke="#0f2a35" stroke-width="13" fill="none" stroke-linecap="round"/>
            <path d="M475,350 Q520,280 560,220" stroke="#0f2a35" stroke-width="11" fill="none" stroke-linecap="round"/>
            <path d="M445,520 Q400,470 370,420" stroke="#0f2a35" stroke-width="10" fill="none" stroke-linecap="round"/>
            <path d="M480,480 Q530,430 560,380" stroke="#0f2a35" stroke-width="9" fill="none" stroke-linecap="round"/>

            <!-- Arbre M5 -->
            <path d="M600,1080 L590,210 Q610,110 625,40 Q635,120 628,210 L640,1080 Z" fill="#0d2430" />
            <path d="M605,430 Q560,360 530,290" stroke="#0d2430" stroke-width="11" fill="none" stroke-linecap="round"/>
            <path d="M625,390 Q670,320 700,260" stroke="#0d2430" stroke-width="10" fill="none" stroke-linecap="round"/>

            <!-- Arbre M6 -->
            <path d="M750,1080 L740,190 Q760,90 775,25 Q785,100 778,190 L790,1080 Z" fill="url(#trunkMid)" />
            <path d="M755,400 Q710,330 680,260" stroke="#0f2a35" stroke-width="12" fill="none" stroke-linecap="round"/>
            <path d="M775,360 Q820,290 850,230" stroke="#0f2a35" stroke-width="10" fill="none" stroke-linecap="round"/>

            <!-- Arbre M7 -->
            <path d="M900,1080 L890,200 Q910,100 925,35 Q935,110 928,200 L940,1080 Z" fill="#0e2832" />

            <!-- Arbre M8 -->
            <path d="M1050,1080 L1040,180 Q1060,80 1075,20 Q1085,90 1078,180 L1090,1080 Z" fill="url(#trunkMid)" />
            <path d="M1055,420 Q1010,350 980,280" stroke="#0f2a35" stroke-width="12" fill="none" stroke-linecap="round"/>
            <path d="M1075,380 Q1120,310 1150,250" stroke="#0f2a35" stroke-width="10" fill="none" stroke-linecap="round"/>

            <!-- Arbre M9 -->
            <path d="M1200,1080 L1190,210 Q1210,110 1225,40 Q1235,120 1228,210 L1240,1080 Z" fill="#0d2430" />

            <!-- Arbre M10 -->
            <path d="M1350,1080 L1340,190 Q1360,90 1375,30 Q1385,100 1378,190 L1390,1080 Z" fill="url(#trunkMid)" />
            <path d="M1355,410 Q1310,340 1280,270" stroke="#0f2a35" stroke-width="11" fill="none" stroke-linecap="round"/>
            <path d="M1375,370 Q1420,300 1450,240" stroke="#0f2a35" stroke-width="10" fill="none" stroke-linecap="round"/>

            <!-- Arbre M11 -->
            <path d="M1500,1080 L1490,200 Q1510,100 1525,35 Q1535,110 1528,200 L1540,1080 Z" fill="#0e2832" />

            <!-- Arbre M12 -->
            <path d="M1650,1080 L1640,220 Q1660,120 1675,50 Q1685,130 1678,220 L1690,1080 Z" fill="url(#trunkMid)" />

            <!-- Arbre M13 -->
            <path d="M1800,1080 L1790,190 Q1810,90 1825,25 Q1835,100 1828,190 L1840,1080 Z" fill="#0c2530" />
            <path d="M1805,400 Q1760,330 1730,260" stroke="#0c2530" stroke-width="12" fill="none" stroke-linecap="round"/>
            <path d="M1825,370 Q1870,300 1900,240" stroke="#0c2530" stroke-width="10" fill="none" stroke-linecap="round"/>
        </svg>

        <svg class="forest-layer forest-front" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
            <!-- ARBRES AVANT (les plus visibles et détaillés) -->

            <!-- Arbre F1 - Extrême gauche, large -->
            <path d="M-30,1080 L-50,300 Q-20,180 10,80 Q35,150 30,280 L60,1080 Z" fill="#091a22" />
            <path d="M-20,500 Q-80,420 -120,350" stroke="#091a22" stroke-width="16" fill="none" stroke-linecap="round"/>
            <path d="M20,450 Q70,370 110,300" stroke="#091a22" stroke-width="14" fill="none" stroke-linecap="round"/>
            <path d="M-10,650 Q-60,580 -90,520" stroke="#091a22" stroke-width="12" fill="none" stroke-linecap="round"/>
            <!-- Highlight -->
            <path d="M0,400 L5,300 Q10,200 15,120" stroke="rgba(25,70,90,0.3)" stroke-width="4" fill="none"/>

            <!-- Arbre F2 -->
            <path d="M120,1080 L100,280 Q130,150 155,60 Q175,160 168,280 L185,1080 Z" fill="url(#trunkDark)" />
            <path d="M115,480 Q70,400 40,320" stroke="#0a1a20" stroke-width="15" fill="none" stroke-linecap="round"/>
            <path d="M155,420 Q200,340 240,270" stroke="#0a1a20" stroke-width="13" fill="none" stroke-linecap="round"/>
            <path d="M120,600 Q80,540 50,480" stroke="#0a1a20" stroke-width="11" fill="none" stroke-linecap="round"/>
            <path d="M160,560 Q210,500 250,440" stroke="#0a1a20" stroke-width="10" fill="none" stroke-linecap="round"/>
            <!-- Highlight -->
            <path d="M140,500 L142,350 Q148,220 153,100" stroke="rgba(25,70,90,0.25)" stroke-width="5" fill="none"/>

            <!-- Arbre F3 - Grand et tordu -->
            <path d="M280,1080 L260,250 Q295,120 320,40 Q345,130 335,260 L350,1080 Z" fill="#0b1e28" />
            <path d="M275,460 Q220,380 180,300" stroke="#0b1e28" stroke-width="16" fill="none" stroke-linecap="round"/>
            <path d="M180,300 Q150,250 130,200" stroke="#0b1e28" stroke-width="10" fill="none" stroke-linecap="round"/>
            <path d="M325,400 Q380,320 420,250" stroke="#0b1e28" stroke-width="14" fill="none" stroke-linecap="round"/>
            <path d="M420,250 Q450,210 470,170" stroke="#0b1e28" stroke-width="8" fill="none" stroke-linecap="round"/>
            <path d="M285,580 Q240,520 210,460" stroke="#0b1e28" stroke-width="12" fill="none" stroke-linecap="round"/>

            <!-- Arbre F4 -->
            <path d="M460,1080 L445,300 Q470,170 495,70 Q515,180 508,300 L520,1080 Z" fill="url(#trunkDark)" />
            <path d="M455,500 Q400,420 360,340" stroke="#0a1a20" stroke-width="15" fill="none" stroke-linecap="round"/>
            <path d="M500,440 Q550,360 590,280" stroke="#0a1a20" stroke-width="13" fill="none" stroke-linecap="round"/>

            <!-- Arbre F5 - Centre-gauche -->
            <path d="M620,1080 L605,270 Q635,140 660,50 Q680,150 672,270 L690,1080 Z" fill="#0b1e28" />
            <path d="M615,470 Q560,390 520,310" stroke="#0b1e28" stroke-width="14" fill="none" stroke-linecap="round"/>
            <path d="M665,410 Q720,330 760,260" stroke="#0b1e28" stroke-width="12" fill="none" stroke-linecap="round"/>
            <!-- Highlight -->
            <path d="M645,450 L648,330 Q655,200 660,90" stroke="rgba(30,80,100,0.2)" stroke-width="5" fill="none"/>

            <!-- Arbre F6 - Centre (encadre le texte à gauche) -->
            <path d="M770,1080 L755,240 Q785,110 810,30 Q830,120 822,240 L840,1080 Z" fill="url(#trunkDark)" />
            <path d="M765,440 Q710,360 670,280" stroke="#0a1a20" stroke-width="16" fill="none" stroke-linecap="round"/>
            <path d="M815,380 Q870,300 910,230" stroke="#0a1a20" stroke-width="13" fill="none" stroke-linecap="round"/>
            <path d="M770,580 Q730,520 700,460" stroke="#0a1a20" stroke-width="11" fill="none" stroke-linecap="round"/>

            <!-- Arbre F7 - Centre (encadre le texte à droite) -->
            <path d="M1080,1080 L1065,250 Q1095,120 1120,35 Q1140,130 1132,250 L1150,1080 Z" fill="#0b1e28" />
            <path d="M1075,460 Q1020,380 980,300" stroke="#0b1e28" stroke-width="15" fill="none" stroke-linecap="round"/>
            <path d="M1125,400 Q1180,320 1220,250" stroke="#0b1e28" stroke-width="13" fill="none" stroke-linecap="round"/>

            <!-- Arbre F8 -->
            <path d="M1240,1080 L1225,280 Q1255,150 1280,60 Q1300,160 1292,280 L1310,1080 Z" fill="url(#trunkDark)" />
            <path d="M1235,490 Q1180,410 1140,330" stroke="#0a1a20" stroke-width="14" fill="none" stroke-linecap="round"/>
            <path d="M1285,430 Q1340,350 1380,280" stroke="#0a1a20" stroke-width="12" fill="none" stroke-linecap="round"/>

            <!-- Arbre F9 -->
            <path d="M1400,1080 L1385,260 Q1415,130 1440,45 Q1460,140 1452,260 L1470,1080 Z" fill="#0b1e28" />
            <path d="M1395,470 Q1340,390 1300,310" stroke="#0b1e28" stroke-width="15" fill="none" stroke-linecap="round"/>
            <path d="M1445,410 Q1500,330 1540,260" stroke="#0b1e28" stroke-width="13" fill="none" stroke-linecap="round"/>
            <path d="M1400,600 Q1360,540 1330,480" stroke="#0b1e28" stroke-width="11" fill="none" stroke-linecap="round"/>

            <!-- Arbre F10 -->
            <path d="M1560,1080 L1545,290 Q1575,160 1600,70 Q1620,170 1612,290 L1630,1080 Z" fill="url(#trunkDark)" />
            <path d="M1555,500 Q1500,420 1460,340" stroke="#0a1a20" stroke-width="14" fill="none" stroke-linecap="round"/>
            <path d="M1605,440 Q1660,360 1700,280" stroke="#0a1a20" stroke-width="12" fill="none" stroke-linecap="round"/>

            <!-- Arbre F11 - Large droite -->
            <path d="M1720,1080 L1700,270 Q1735,140 1760,50 Q1780,150 1772,270 L1790,1080 Z" fill="#0b1e28" />
            <path d="M1715,460 Q1660,380 1620,300" stroke="#0b1e28" stroke-width="16" fill="none" stroke-linecap="round"/>
            <path d="M1765,400 Q1820,320 1860,250" stroke="#0b1e28" stroke-width="14" fill="none" stroke-linecap="round"/>

            <!-- Arbre F12 - Extrême droite -->
            <path d="M1880,1080 L1865,300 Q1895,170 1920,80 Q1940,180 1932,300 L1950,1080 Z" fill="#091a22" />
            <path d="M1875,510 Q1820,430 1780,350" stroke="#091a22" stroke-width="15" fill="none" stroke-linecap="round"/>
            <path d="M1925,450 Q1970,370 2000,300" stroke="#091a22" stroke-width="13" fill="none" stroke-linecap="round"/>

            <!-- SOL DE LA FORÊT -->
            <!-- Sol principal -->
            <path d="M0,850 Q200,830 400,845 Q600,855 800,840 Q1000,830 1200,850 Q1400,860 1600,840 Q1800,830 1920,850 L1920,1080 L0,1080 Z" fill="#091a22" />

            <!-- Reflets au sol (style low-poly) -->
            <polygon points="300,870 500,860 450,920 280,910" fill="rgba(15,50,65,0.4)" />
            <polygon points="500,860 700,855 680,910 450,920" fill="rgba(12,40,55,0.3)" />
            <polygon points="700,855 900,850 880,900 680,910" fill="rgba(18,60,75,0.35)" />
            <polygon points="900,850 1100,855 1080,905 880,900" fill="rgba(12,45,58,0.3)" />
            <polygon points="1100,855 1300,860 1280,915 1080,905" fill="rgba(15,50,65,0.35)" />
            <polygon points="200,910 400,900 380,960 180,950" fill="rgba(10,35,48,0.3)" />
            <polygon points="600,900 800,895 780,950 580,945" fill="rgba(14,48,62,0.25)" />
            <polygon points="1000,895 1200,900 1180,955 980,948" fill="rgba(12,42,56,0.3)" />
            <polygon points="1400,905 1600,900 1580,955 1380,950" fill="rgba(10,38,50,0.25)" />

            <!-- Eau / Mare en bas -->
            <path d="M0,980 Q300,970 500,975 Q700,980 960,972 Q1200,968 1400,975 Q1600,980 1920,970 L1920,1080 L0,1080 Z" fill="rgba(5,20,30,0.8)" />
            <path d="M100,990 Q400,985 700,988 Q1000,992 1300,986 Q1600,984 1920,990 L1920,1080 L0,1080 Z" fill="rgba(3,15,22,0.9)" />
        </svg>

        <!-- Petites lueurs / fireflies -->
        <div class="fireflies" id="fireflies"></div>
    </div>

    <!-- CONTENU PRINCIPAL -->
    <div class="container" id="container">
        <!-- ÉCRAN D'ACCUEIL -->
        <div class="screen active" id="screen-intro">
            <p class="intro-text">CLICK, DRAG AND RELEASE</p>
            <p class="intro-subtext">FOR YOUR PATRONUS</p>
            <div class="swipe-area" id="swipe-area"></div>
        </div>

        <!-- ÉCRAN DE QUESTION -->
        <div class="screen" id="screen-question">
            <div class="question-counter" id="question-counter"></div>
            <div class="choices" id="choices"></div>
        </div>

        <!-- ÉCRAN DE CHARGEMENT -->
        <div class="screen" id="screen-loading">
            <div class="patronus-orb">
                <div class="orb"></div>
            </div>
        </div>

        <!-- ÉCRAN RÉSULTAT -->
        <div class="screen" id="screen-result">
            <div class="result-glow"></div>
            <div class="patronus-emoji" id="patronus-emoji"></div>
            <h2 class="result-title">TON PATRONUS EST</h2>
            <h1 class="patronus-name" id="patronus-name"></h1>
            <p class="patronus-description" id="patronus-description"></p>
            <button class="btn-restart" id="btn-restart">RECOMMENCER</button>
        </div>
    </div>

    <!-- Barre son en bas à droite (décorative) -->
    <div class="sound-bars">
        <span></span><span></span><span></span><span></span>
    </div>

    <script src="patronus.js"></script>
</body>
</html>
